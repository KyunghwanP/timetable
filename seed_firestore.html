  const statusEl = document.getElementById('status');
  const loginBtn = document.getElementById('loginBtn');
  const uploadBtn = document.getElementById('uploadBtn');

  function setStatus(msg, cls){
    statusEl.textContent = msg;
    statusEl.className = cls || '';
  }

  let currentUser = null;

  loginBtn.addEventListener('click', async () => {
    try{
      const provider = new GoogleAuthProvider();
      provider.setCustomParameters({ hd: 'yeungnam.hs.kr' });
      const result = await signInWithPopup(auth, provider);
      currentUser = result.user;
      if(!currentUser.email.endsWith('@yeungnam.hs.kr')){
        setStatus('학교 계정(@yeungnam.hs.kr)으로 로그인해주세요. 지금 로그인된 계정: ' + currentUser.email, 'err');
        uploadBtn.disabled = true;
        return;
      }
      setStatus('로그인 성공: ' + currentUser.email + '\n이제 "데이터 업로드" 버튼을 눌러주세요.', 'ok');
      uploadBtn.disabled = false;
    }catch(e){
      setStatus('로그인 실패: ' + e.message, 'err');
    }
  });

  uploadBtn.addEventListener('click', async () => {
    uploadBtn.disabled = true;
    setStatus('업로드 중...');
